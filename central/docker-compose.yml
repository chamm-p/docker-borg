services:
  central:
    build: .
    container_name: dborg-central
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DBORG_REGISTRATION_TOKEN=${DBORG_REGISTRATION_TOKEN:-change-me}
      - DBORG_SECRET_KEY=${DBORG_SECRET_KEY:-change-me-random}
      - DBORG_LOG_LEVEL=${DBORG_LOG_LEVEL:-INFO}
    volumes:
      - central-data:/app/data

volumes:
  central-data:
