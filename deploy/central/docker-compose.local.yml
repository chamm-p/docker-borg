# Central / Backend — LOKAL gebaut (kein GHCR-Pull).
# Für Test-Deployment auf normalem ARM64-Linux, weg von QNAP.
# Bauen + starten:
#   docker compose -f docker-compose.local.yml up -d --build
services:
  central:
    build:
      context: ../../central
      dockerfile: Dockerfile
    image: dborg-central:local
    container_name: dborg-central
    restart: unless-stopped
    ports:
      # Host-Port 8089 (8080 war belegt). Dieser Port muss in DBORG_CENTRAL_URL
      # der Agents stehen. Container-intern bleibt 8080.
      - "8089:8080"
    environment:
      - TZ=Europe/Zurich
      - DBORG_REGISTRATION_TOKEN=CHANGE_ME_REGISTRATION_TOKEN
      - DBORG_ADMIN_PASSWORD=CHANGE_ME_ADMIN_PASSWORD
      - DBORG_SECRET_KEY=CHANGE_ME_SECRET_KEY
      - DBORG_LOG_LEVEL=INFO
    volumes:
      - central-data:/app/data

volumes:
  central-data:
