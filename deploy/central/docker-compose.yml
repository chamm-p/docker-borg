# Central / Backend — Image von GHCR (kein lokales Bauen).
# Host-spezifische Werte kommen aus .env (siehe .env.example) — diese Datei
# wird NIE manuell editiert.
#   cp .env.example .env        # einmalig, dann .env ausfüllen
#   docker compose pull
#   docker compose up -d
# (Lokal bauen statt pullen? → docker-compose.build.yml)
services:
  central:
    image: ghcr.io/chamm-p/docker-borg-central:latest
    container_name: dborg-central
    restart: unless-stopped
    ports:
      - "${DBORG_CENTRAL_PORT:-8089}:8080"
    environment:
      - TZ=${TZ:-Europe/Zurich}
      - DBORG_REGISTRATION_TOKEN=${DBORG_REGISTRATION_TOKEN:?set in .env}
      - DBORG_ADMIN_PASSWORD=${DBORG_ADMIN_PASSWORD:?set in .env}
      - DBORG_SECRET_KEY=${DBORG_SECRET_KEY:?set in .env}
      - DBORG_LOG_LEVEL=${DBORG_LOG_LEVEL:-INFO}
      # E-Mail-Benachrichtigung (optional — leer lassen = aus)
      - DBORG_SMTP_HOST=${DBORG_SMTP_HOST:-}
      - DBORG_SMTP_PORT=${DBORG_SMTP_PORT:-587}
      - DBORG_SMTP_USER=${DBORG_SMTP_USER:-}
      - DBORG_SMTP_PASSWORD=${DBORG_SMTP_PASSWORD:-}
      - DBORG_SMTP_FROM=${DBORG_SMTP_FROM:-}
      - DBORG_SMTP_TO=${DBORG_SMTP_TO:-}
      - DBORG_SMTP_TLS=${DBORG_SMTP_TLS:-true}
      - DBORG_SMTP_SSL=${DBORG_SMTP_SSL:-false}
      - DBORG_NOTIFY=${DBORG_NOTIFY:-failure}
    volumes:
      - central-data:/app/data

volumes:
  central-data:
