services:
  agent:
    image: ghcr.io/chamm-p/docker-borg-agent:latest
    container_name: dborg-agent
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
      - DBORG_AGENT_NAME=CHANGE_ME_HOSTNAME
      - DBORG_CENTRAL_URL=http://CHANGE_ME_CENTRAL_IP:8080
      - DBORG_REGISTRATION_TOKEN=CHANGE_ME_REGISTRATION_TOKEN
      # Hostpfad-Basis deiner Compose-Projekte
      - DBORG_HOST_BASE_DIR=/home/CHANGE_ME_USER/docker
      # Optional: andere Volume-Namen (Standard reicht meist)
      # - DBORG_AGENT_DATA_VOLUME=agent-data
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount source MUST equal DBORG_HOST_BASE_DIR
      - /home/CHANGE_ME_USER/docker:/host/docker:ro
      - agent-data:/data
    # Hartes Mem-Limit — Agent orchestriert nur, braucht wenig
    mem_limit: 128m
    memswap_limit: 128m

volumes:
  agent-data:
