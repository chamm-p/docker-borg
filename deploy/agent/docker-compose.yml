# Agent — Image von GHCR (kein lokales Bauen).
# Host-spezifische Werte kommen aus .env (siehe .env.example) — diese Datei
# wird NIE manuell editiert.
#   cp .env.example .env        # einmalig, dann .env ausfüllen
#   docker compose pull
#   docker compose up -d
# Der Agent pullt das Worker-Image (ghcr.io/chamm-p/docker-borg-worker:latest)
# beim Start automatisch. (Lokal bauen statt pullen? → docker-compose.build.yml)
services:
  agent:
    image: ghcr.io/chamm-p/docker-borg-agent:latest
    container_name: dborg-agent
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Zurich}
      - DBORG_AGENT_NAME=${DBORG_AGENT_NAME:?set in .env}
      - DBORG_CENTRAL_URL=${DBORG_CENTRAL_URL:?set in .env}
      - DBORG_REGISTRATION_TOKEN=${DBORG_REGISTRATION_TOKEN:?set in .env}
      - DBORG_HOST_BASE_DIR=${DBORG_HOST_BASE_DIR:?set in .env}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount-Source = DBORG_HOST_BASE_DIR (eine Quelle, keine Doppelpflege)
      - ${DBORG_HOST_BASE_DIR:?set in .env}:/host/docker:ro
      - agent-data:/data
    # Agent orchestriert nur — hartes, kleines Mem-Limit.
    mem_limit: 128m
    memswap_limit: 128m

volumes:
  agent-data:
