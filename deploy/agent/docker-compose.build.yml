# Agent — lokal gebaut (ohne GHCR).
# Host-spezifische Werte kommen aus .env (siehe .env.example) — diese Datei
# wird NIE manuell editiert.
#
# Baut zwei Images:
#   - dborg-agent:local   (dieser Service, startet als Daemon)
#   - dborg-worker:local  (Service "worker-build", startet NIE — nur Build)
# Der Worker wird vom Agent zur Laufzeit per Docker-Socket gestartet,
# deshalb muss das Image lokal vorliegen.
#
#   cp .env.example .env                       # einmalig, dann .env ausfüllen
#   docker compose --profile build build       # baut agent + worker
#   docker compose up -d                        # startet nur agent
services:
  agent:
    build:
      context: ../../agent
      dockerfile: Dockerfile
    image: dborg-agent:local
    container_name: dborg-agent
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Zurich}
      - DBORG_AGENT_NAME=${DBORG_AGENT_NAME:?set in .env}
      - DBORG_CENTRAL_URL=${DBORG_CENTRAL_URL:?set in .env}
      - DBORG_REGISTRATION_TOKEN=${DBORG_REGISTRATION_TOKEN:?set in .env}
      - DBORG_HOST_BASE_DIR=${DBORG_HOST_BASE_DIR:?set in .env}
      # Lokal gebautes Worker-Image — kein Registry-Pull. Der Agent versucht
      # beim Start trotzdem ein "docker pull" → die Warnung "Konnte Worker-Image
      # nicht pullen" ist erwartet & harmlos, er nutzt das lokal gebaute Image.
      - DBORG_WORKER_IMAGE=dborg-worker:local
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount-Source = DBORG_HOST_BASE_DIR (eine Quelle, keine Doppelpflege)
      - ${DBORG_HOST_BASE_DIR:?set in .env}:/host/docker:ro
      - agent-data:/data
    # Agent orchestriert nur — hartes, kleines Mem-Limit.
    mem_limit: 128m
    memswap_limit: 128m

  # Baut NUR das Worker-Image lokal. Profil "build" → startet bei "up" nicht.
  worker-build:
    build:
      context: ../../worker
      dockerfile: Dockerfile
    image: dborg-worker:local
    entrypoint: ["true"]
    profiles: ["build"]
    restart: "no"

volumes:
  agent-data:
