services:
  central:
    build: ./central
    container_name: dborg-central
    restart: unless-stopped
    ports:
      - "${CENTRAL_PORT:-8080}:8080"
    environment:
      - DBORG_REGISTRATION_TOKEN=${DBORG_REGISTRATION_TOKEN}
      - DBORG_ADMIN_PASSWORD=${DBORG_ADMIN_PASSWORD}
      - DBORG_SECRET_KEY=${DBORG_SECRET_KEY}
      - DBORG_LOG_LEVEL=INFO
    volumes:
      - central-data:/app/data

  agent:
    build: ./agent
    container_name: dborg-agent
    restart: unless-stopped
    depends_on:
      - central
    environment:
      - DBORG_AGENT_NAME=${DBORG_AGENT_NAME:-local}
      - DBORG_CENTRAL_URL=http://central:8080
      - DBORG_REGISTRATION_TOKEN=${DBORG_REGISTRATION_TOKEN}
      - DBORG_DOCKER_HOST_DIR=/host/docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DOCKER_HOST_DIR:-.}:/host/docker:ro
      - agent-data:/data
    command: ["daemon"]

volumes:
  central-data:
  agent-data:
